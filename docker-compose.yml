version: "3.9"

services:
  biosignal:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/backend/models  # Mount models directory
      - ./uploads:/app/uploads                 # Persist uploads
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
